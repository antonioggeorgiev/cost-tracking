services:
  postgres:
    image: postgres:17-alpine
    container_name: cost-tracking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cost_tracking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cost_tracking"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
